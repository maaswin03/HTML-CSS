<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300..700&display=swap"
      rel="stylesheet"
    />
    <title>Task - 7 Carousel</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div>
      <p class="grid-badge">IPL Details</p>
      <h1 class="grid-header">IPL - Indian Premier League</h1>
    </div>

    <input type="radio" name="slider" id="slide1" checked />
    <input type="radio" name="slider" id="slide2" />
    <input type="radio" name="slider" id="slide3" />

    <div class="slides">
      <div class="slider-content1">
        <div class="grid">
          <div class="grid-image-container">
            <img
              src="https://documents.iplt20.com/ipl/IPLHeadshot2025/57.png"
              alt="MS Dhoni"
              class="grid-image"
            />
          </div>
          <div class="grid-contents">
            <h1>M S Dhoni</h1>
            <p>WK - Batter</p>
            <div class="extra-content">
              <p>Thala for a reason</p>
            </div>
          </div>
        </div>
      </div>

      <div class="slider-content2">
        <div class="grid">
          <div class="grid-image-container">
            <img
              src="https://documents.iplt20.com/ipl/IPLHeadshot2025/2.png"
              alt="Virat Kohli"
              class="grid-image"
            />
          </div>
          <div class="grid-contents">
            <h1>Virat Kohli</h1>
            <p>Batter</p>
            <div class="extra-content">
              <p>King Kohli</p>
            </div>
          </div>
        </div>
      </div>

      <div class="slider-content3">
        <div class="grid">
          <div class="grid-image-container">
            <img
              src="https://documents.iplt20.com/ipl/IPLHeadshot2025/6.png"
              alt="Rohit Sharma"
              class="grid-image"
            />
          </div>
          <div class="grid-contents">
            <h1>Rohit Sharma</h1>
            <p>Batter</p>
            <div class="extra-content">
              <p>Hitman of India</p>
            </div>
          </div>
        </div>
      </div>
    </div>
    <div class="nav">
      <label for="slide1"></label>
      <label for="slide2"></label>
      <label for="slide3"></label>
    </div>
  </body>
</html>
